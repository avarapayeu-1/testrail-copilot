name: TestRail Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 1' # Run weekly on Mondays at midnight UTC

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Create .env file
        run: |
          echo "BASE_URL=${{ secrets.TESTRAIL_BASE_URL }}" >> .env
          echo "DEFAULT_USER_EMAIL=${{ secrets.TESTRAIL_EMAIL }}" >> .env
          echo "DEFAULT_USER_PASSWORD=${{ secrets.TESTRAIL_PASSWORD }}" >> .env
          echo "API_KEY=${{ secrets.TESTRAIL_API_KEY }}" >> .env

      - name: Run API tests
        run: npm run test:api
        
      # Run UI tests separately as they might be more flaky
      - name: Run UI tests
        run: npm run test:e2e
        continue-on-error: true # Don't fail the workflow if UI tests fail

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
            screenshots/
          retention-days: 14
