name: TestRail Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 0'  # Run every Sunday at midnight
  workflow_dispatch:  # Allow manual triggering

jobs:
  docker-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-type: [api, ui, e2e]
    
    steps:
      - uses: actions/checkout@v4
        
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3
        
      - name: Create env file
        run: |
          echo "# Environment" > .env
          echo "TEST_ENV=ci" >> .env
          echo "# Application URLs" >> .env
          echo "BASE_URL=${{ secrets.TESTRAIL_BASE_URL }}" >> .env
          echo "API_URL=${{ secrets.TESTRAIL_BASE_URL }}/index.php?/api/v2/" >> .env
          echo "# Global User Credentials" >> .env
          echo "USER_EMAIL=${{ secrets.TESTRAIL_EMAIL }}" >> .env
          echo "USER_PASSWORD=${{ secrets.TESTRAIL_PASSWORD }}" >> .env
          echo "TESTRAIL_EMAIL=${{ secrets.TESTRAIL_EMAIL }}" >> .env
          echo "TESTRAIL_PASSWORD=${{ secrets.TESTRAIL_PASSWORD }}" >> .env
          echo "TESTRAIL_API_KEY=${{ secrets.TESTRAIL_API_KEY }}" >> .env
          echo "# Test Configuration" >> .env
          echo "HEADLESS=true" >> .env
          echo "TIMEOUT=60000" >> .env
          echo "RETRY_COUNT=2" >> .env
          echo "# CI Configuration" >> .env
          echo "CI=true" >> .env
          
      - name: Build Docker image
        run: docker build -t testrail-playwright-tests .
        
      - name: Run ${{ matrix.test-type }} tests
        run: |
          mkdir -p playwright-report
          mkdir -p test-results
          mkdir -p logs
          docker-compose --env-file .env run \
            -v $(pwd)/playwright-report:/app/playwright-report \
            -v $(pwd)/test-results:/app/test-results \
            -v $(pwd)/logs:/app/logs \
            ${{ matrix.test-type }}-tests
      
      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results-${{ matrix.test-type }}
          path: |
            playwright-report/
            test-results/
            logs/
          retention-days: 30
